<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FMDQ Auction Item</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <style>
      body[data-app-loading="true"] {
        margin: 0;
        background: #e6e8eb;
      }

      body[data-app-loading="true"] [data-app-root] {
        visibility: hidden;
      }

      [data-app-loader] {
        display: none;
      }

      body[data-app-loading="true"] [data-app-loader] {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
    </style>
  </head>
  <body data-app-loading="true">
    <div data-app-loader>
      <div style="width:min(560px,100%);border:1px solid rgba(15,23,42,.08);border-radius:32px;background:rgba(255,255,255,.92);padding:40px 32px;text-align:center;box-shadow:0 24px 70px rgba(148,163,184,.18);font-family:'Space Grotesk',sans-serif;color:#0f172a;">
        <img src="/slides/fmdq-logo.png" alt="FMDQ" style="height:44px;width:auto;" />
        <p style="margin:20px 0 0;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#64748b;">Loading item details</p>
      </div>
    </div>
    <div class="min-h-screen bg-ash" data-app-root>
      <header class="border-b border-ink/10 bg-white">
        <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-6 py-5">
          <div class="flex items-center gap-3">
            <img src="/slides/fmdq-logo.png" alt="FMDQ" class="h-10 w-auto" />
          </div>
          <a href="/bidding.html" class="rounded-full border border-ink/20 px-4 py-2 text-xs font-semibold text-ink">Back to listings</a>
        </nav>
      </header>

      <main class="mx-auto w-full max-w-6xl px-6 py-10">
        <div id="item-view" class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]"></div>
      </main>

      <footer class="border-t border-ink/10 bg-white">
        <div class="mx-auto flex w-full max-w-6xl flex-wrap items-center justify-between gap-4 px-6 py-8 text-sm text-slate">
          <p>FMDQ Group PLC Auctions Portal</p>
          <p>Secure listings - Anonymous bidding</p>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/item.ts"></script>
  </body>
</html>
