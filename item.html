<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FMDQ Auction Item</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <style>
      body[data-app-loading="true"] {
        margin: 0;
        background: #e6e8eb;
      }

      body[data-app-loading="true"] [data-app-root] {
        visibility: hidden;
      }

      [data-app-loader] {
        display: none;
      }

      body[data-app-loading="true"] [data-app-loader] {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
    </style>
  </head>
  <body data-app-loading="true">
    <div data-app-loader>
      <div class="boot-splash-card">
        <img src="/slides/fmdq-logo.png" alt="FMDQ" class="boot-splash-logo" />
        <p class="boot-splash-label">Loading item details</p>
      </div>
    </div>
    <div class="min-h-screen bg-ash" data-app-root>
      <div id="item-header"></div>

      <main class="mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-10">
        <div id="item-view" class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]"></div>
      </main>

      <footer class="border-t border-ink/10 bg-white">
        <div class="mx-auto flex w-full max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-8 text-sm text-slate sm:px-6">
          <p>FMDQ Group PLC Auctions Portal</p>
          <p>Secure listings - Anonymous bidding</p>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/item.ts"></script>
  </body>
</html>
