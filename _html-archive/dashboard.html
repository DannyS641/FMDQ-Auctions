<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FMDQ Auctions - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet" />
    <style>
      body[data-app-loading="true"] { margin: 0; background: #e6e8eb; }
      body[data-app-loading="true"] [data-app-root] { visibility: hidden; }
      [data-app-loader] { display: none; }
      body[data-app-loading="true"] [data-app-loader] { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    </style>
  </head>
  <body data-app-loading="true">
    <div data-app-loader>
      <div class="boot-splash-card">
        <img src="/slides/fmdq-logo.png" alt="FMDQ" class="boot-splash-logo" />
        <p class="boot-splash-label">Loading dashboard</p>
      </div>
    </div>
    <div data-app-root id="dashboard-app"></div>
    <script type="module" src="/src/dashboard.ts"></script>
  </body>
</html>
