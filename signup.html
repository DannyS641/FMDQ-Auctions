<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FMDQ Auctions - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <style>
      body[data-app-loading="true"] {
        margin: 0;
        background: #eef2f1;
      }

      body[data-app-loading="true"] > :not([data-app-loader]) {
        visibility: hidden;
      }

      [data-app-loader] {
        display: none;
      }

      body[data-app-loading="true"] [data-app-loader] {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
    </style>
  </head>
  <body data-app-loading="true">
    <div data-app-loader>
      <div style="width:min(560px,100%);border:1px solid rgba(15,23,42,.08);border-radius:32px;background:rgba(255,255,255,.88);padding:40px 32px;text-align:center;box-shadow:0 24px 70px rgba(148,163,184,.18);font-family:'Space Grotesk',sans-serif;color:#0f172a;">
        <img src="/slides/fmdq-logo.png" alt="FMDQ" style="display:block;height:44px;width:auto;margin:0 auto;" />
        <p style="margin:20px 0 0;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#64748b;">Loading account setup</p>
      </div>
    </div>
    <script type="module" src="/src/signup.ts"></script>
  </body>
</html>
